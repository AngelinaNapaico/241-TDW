<!doctype html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="static/css/output.css" rel="stylesheet">
    <title>Document</title>

</head>


<body class="bg-gray-100 p-6">
    <div class="max-w-xl mx-auto bg-white shadow-md rounded p-8">
        <h1 class="text-2xl font-bold mb-4 text-center">Formulario Contactanos</h1>
        {% with messages = get_flashed_messages() %}
        {% if messages %}
        <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded relative" role="alert">
            <strong class="font-bold">¡Éxito!</strong>
            <span class="block sm:inline">{{ messages[0] }}</span>
        </div>

        <form method="post" class="space-y-4">
            <div>
                <label for="name" class="block text-gray-700">Name:</label>
                <input type="text" id="name" name="name" required class="w-full px-3 py-2 border rounded">
                <div>
                    <label for="email" class="block text-gray-700">Email:</label>
                    <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded">
                </div>
                <div>
                    <label for="message" class="block text-gray-700">Message:</label>
                    <textarea id="message" name="message" rows="4" required
                        class="w-full px-3 py-2 border rounded"></textarea>
                </div>

                <button type="submit" class="bg-rose-500 text-white px-4 py-2 rounded hover:bg-blue-600">enviar</button>

        </form>
</body>


</html>
