<head><link rel="stylesheet" href="{{ url_for('static', filename='css/output.css') }}"></head>
<body class="bg-gray-100 p-6">
    <div class="max-w-xl mx-auto bg-white shadow-md rounded p-8">
        <h1 class="text-2xl font-bold mb-4 text-center">Formulario Contactanos</h1>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            <div class="bg-green-100 border border-green-400 text-green-700 px-4 py-3 rounded mb-4">
                {{ messages[0] }}
            </div>
          {% endif %}
        {% endwith %}

        <form method="post" class="space-y-4">
            <div>
                <label for="name" class="block text-gray-700">Name:</label>
                <input type="text" id="name" name="name" required class="w-full px-3 py-2 border rounded">
            </div>
            <div>
                <label for="email" class="block text-gray-700">Email:</label>
                <input type="email" id="email" name="email" required class="w-full px-3 py-2 border rounded">
            </div>
            <div>
                <label for="message" class="block text-gray-700">Message:</label>
                <textarea id="message" name="message" rows="4" required class="w-full px-3 py-2 border rounded"></textarea>
            </div>
            <button type="submit" class="bg-rose-500 text-white px-4 py-2 rounded hover:bg-rose-600">Enviar</button>
        </form>
    </div>
</body>
